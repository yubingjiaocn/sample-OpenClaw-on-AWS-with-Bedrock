---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: admin-console
  namespace: openclaw
  annotations:
    # IRSA: needs DynamoDB, S3, SSM, EKS, ECR, ECS, CloudWatch, STS
    eks.amazonaws.com/role-arn: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-console
  namespace: openclaw
  labels:
    app: admin-console
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-console
  template:
    metadata:
      labels:
        app: admin-console
    spec:
      serviceAccountName: admin-console
      containers:
        - name: admin-console
          image: 600413481647.dkr.ecr.us-west-2.amazonaws.com/openclaw/admin-console:latest
          ports:
            - containerPort: 8099
              name: http
          env:
            - name: AWS_REGION
              value: us-west-2
            - name: GATEWAY_REGION
              value: us-west-2
            - name: DYNAMODB_TABLE
              value: openclaw-enterprise
            - name: DYNAMODB_REGION
              value: us-west-2
            - name: STACK_NAME
              value: dev
            - name: CONSOLE_PORT
              value: "8099"
            - name: ADMIN_PASSWORD
              value: admin123
            - name: JWT_SECRET
              value: dev-jwt-secret-change-me
            - name: K8S_IN_CLUSTER
              value: "true"
            - name: OPENCLAW_NAMESPACE
              value: openclaw
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            tcpSocket:
              port: 8099
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8099
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: admin-console
  namespace: openclaw
spec:
  selector:
    app: admin-console
  ports:
    - port: 8099
      targetPort: 8099
      name: http
  type: ClusterIP
